services:
  - type: web
    name: mydashrx-backend
    runtime: node
    plan: starter
    region: ohio
    rootDir: packages/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mydashrx-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_DOMAIN
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

databases:
  - name: mydashrx-db
    databaseName: mydashrx
    plan: starter
    region: ohio
