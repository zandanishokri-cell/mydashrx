name: Deploy Backend to Render

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/backend/**'
      - 'packages/shared/**'
      - 'render.yaml'

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
